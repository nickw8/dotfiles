[tools]
awscli = "latest"
bat = "latest"
btop = "latest"
cargo-binstall = "latest"
chezmoi = "latest"
codex = "latest"
delta = "latest"
dive = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
go = "latest"
helm = "latest"
helm-diff = "latest"
istioctl = "latest"
k9s = { version = "latest", postinstall = "dotfiles-refresh-shell-assets k9s" }
kustomize = "latest"
lazygit = "latest"
neovim = "latest"
python = "latest"
ripgrep = "latest"
rust = "latest"
shellcheck = "latest"
usage = { version = "latest", postinstall = "dotfiles-refresh-shell-assets usage" }
